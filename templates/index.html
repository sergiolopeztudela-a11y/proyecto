<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas Privadas | SecureNotes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header class="container">
        <nav>
            <ul>
                <li><strong>🔐 SecureNotes</strong></li>
            </ul>
            <ul id="nav-actions">
                <!-- Se llenará dinámicamente -->
            </ul>
        </nav>
    </header>

    <main class="container">
        <!-- Auth Section (Option B: Toggle) -->
        <section id="auth-section">
            <div class="auth-container">
                <article id="auth-card">
                    <header>
                        <h2 id="auth-title">Iniciar Sesión</h2>
                        <p id="auth-subtitle">Bienvenido de nuevo a SecureNotes</p>
                    </header>

                    <!-- Login Form -->
                    <form id="login-form">
                        <input type="text" id="login-username" placeholder="Usuario" required>
                        <input type="password" id="login-password" placeholder="Contraseña" required>
                        <button type="submit">Entrar</button>
                    </form>

                    <!-- Register Form (Hidden by default) -->
                    <form id="register-form" class="hidden">
                        <input type="text" id="reg-username" placeholder="Nuevo Usuario" required>
                        <input type="password" id="reg-password" placeholder="Contraseña" required>
                        <ul class="requirement-list">
                            <li id="req-len" class="requirement">Mínimo 10 caracteres</li>
                            <li id="req-upper" class="requirement">Mayúscula y Minúscula</li>
                            <li id="req-num" class="requirement">Al menos un número</li>
                            <li id="req-spec" class="requirement">Carácter especial (@#$¡*)</li>
                        </ul>
                        <button type="submit" class="secondary">Crear Cuenta</button>
                    </form>

                    <footer>
                        <p id="toggle-text">¿No tienes cuenta? <a href="#" id="toggle-auth">Regístrate aquí</a></p>
                    </footer>
                </article>
            </div>
        </section>

        <!-- Dashboard Section (Hidden initially) -->
        <section id="dashboard-section" class="hidden">
            <article>
                <header>Nueva Nota</header>
                <form id="note-form">
                    <input type="text" id="note-title" placeholder="Título" required>
                    <textarea id="note-content" placeholder="Escribe algo..." required></textarea>
                    <button type="submit">Guardar Nota</button>
                </form>
            </article>

            <hr>

            <div id="notes-list" class="grid">
                <!-- Notas se cargarán aquí -->
            </div>
        </section>
    </main>

    <footer class="container">
        <small>Gestor de Notas Privadas &copy; 2026</small>
    </footer>

    <script src="/static/app.js"></script>
</body>

</html>
